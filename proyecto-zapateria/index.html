<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    font-family: Arial;
    background-color: #f4f4f4;
}

form {
    background: white;
    padding: 20px;
    width: 400px;
    margin: 40px auto;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
}

input, select, textarea {
    width: 100%;
    padding: 5px;
    margin-top: 5px;
    margin-bottom: 10px;
}

textarea {
    resize: none;
}

.botones {
    text-align: center;
}

button {
    cursor: pointer;
}

.papelera {
    background: none;
    border: none;
    font-size: 18px;
}
</style>

</head>
<body>

<h2>Formulario de Contacto</h2>

<form id="form">

<label>Nombre:</label>
<input type="text" maxlength="50" required>

<label>Alias:</label>
<input type="password">

<label>Correo:</label>
<input type="email" id="correo">

<label>Teléfono:</label>
<input type="tel" id="telefono">

<label>Instagram:</label>
<input type="url" id="instagram">

<label>Edad:</label>
<input type="number" min="0" max="110" required>

<label>Género:</label><br>
<input type="radio" name="genero" value="Hombre" required> Hombre
<input type="radio" name="genero" value="Mujer"> Mujer
<input type="radio" name="genero" value="Otros"> Otros

<br><br>

<label>Foto:</label>
<input type="file">

<label>Contacto por defecto:</label>
<select id="contacto" required>
<option value="">Seleccione una opción</option>
</select>

<input type="checkbox" required> Aceptar publicidad

<label>Comentarios:</label>
<textarea id="comentarios" maxlength="1000"></textarea>
<button type="button" class="papelera" onclick="borrar()">🗑</button>

<input type="hidden" id="hora">

<div class="botones">
    <input type="submit" value="Enviar">
    <input type="reset" value="Cancelar">
</div>

</form>

<script src="script.js"></script>

</body>
</html>
